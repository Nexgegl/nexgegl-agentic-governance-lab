project_id = "agent-governance-control-plane"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["http://127.0.0.1:3000"]
jwt_expiry = 3600
# Public self-signup is intentionally disabled for this v1: /login only
# implements email/password sign-in. New profiles are provisioned by an
# administrator (service role) — see supabase/seed.sql.
enable_signup = false

[auth.email]
enable_signup = false
enable_confirmations = false
